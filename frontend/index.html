<!DOCTYPE html>
<html>
<head>
    <title>Legal AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f1115, #121826);
            color: #e6d8a3;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #151821;
            padding: 20px;
            border-right: 1px solid #2a2d35;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            margin: 0 0 10px 0;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #c8b87a, #a8975a);
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .history {
            flex: 1;
            overflow-y: auto;
            margin-top: 15px;
        }

        .history-item {
            padding: 8px;
            margin-bottom: 5px;
            background: #1e2230;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .msg {
            max-width: 60%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 15px;
            line-height: 1.4;
        }

        .user {
            background: #c8b87a;
            color: black;
            margin-left: auto;
        }

        .bot {
            background: #1e2230;
        }

        /* INPUT */
        .input-box {
            display: flex;
            padding: 10px;
            border-top: 1px solid #2a2d35;
        }

        .input-box input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        .input-box button {
            margin-left: 10px;
        }

        /* DRAG DROP */
        .drop-area {
            margin-top: 10px;
            padding: 15px;
            border: 2px dashed #555;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
        }

        .drop-area.dragover {
            background: #222;
        }

        /* LOADING */
        .loading span {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin: 2px;
            background: #e6d8a3;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .loading span:nth-child(2){animation-delay:0.2s;}
        .loading span:nth-child(3){animation-delay:0.4s;}

        @keyframes bounce {
            0%,80%,100%{transform:scale(0);}
            40%{transform:scale(1);}
        }
    </style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Legal AI</h2>

        <!-- Hidden file input -->
        <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">

        <!-- Upload button -->
        <button onclick="document.getElementById('fileInput').click()">
            Upload Document
        </button>

        <!-- Drag & Drop -->
        <div class="drop-area" id="dropArea">
            Drag & Drop File Here
        </div>

        <button onclick="newChat()">New Chat</button>

        <div class="history" id="history"></div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="chat" id="chat"></div>

        <div class="input-box">
            <input id="input" placeholder="Ask your legal question..." />
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>

let thread_id = null;
let conversations = [];
let currentChat = [];

/* ================= SESSION ================= */
async function createSession() {
    let res = await fetch("http://127.0.0.1:8000/session", { method: "POST" });
    let data = await res.json();
    thread_id = data.thread_id;
}
createSession();

/* ================= UI ================= */
function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    let chat = document.getElementById("chat");
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* ================= SEND ================= */
async function sendMessage() {
    let input = document.getElementById("input");
    let text = input.value;
    if (!text) return;

    addMessage(text, "user");
    currentChat.push({ role: "user", content: text });

    input.value = "";

    let loading = document.createElement("div");
    loading.className = "msg bot loading";
    loading.innerHTML = "<span></span><span></span><span></span>";
    document.getElementById("chat").appendChild(loading);

    let res = await fetch("http://127.0.0.1:8000/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ question: text, thread_id: thread_id })
    });

    let data = await res.json();

    loading.remove();

    addMessage(data.answer, "bot");
    currentChat.push({ role: "bot", content: data.answer });
}

/* ================= FILE SELECT ================= */
function handleFileSelect(event) {
    let file = event.target.files[0];
    if (file) uploadFile(file);
}

/* ================= UPLOAD ================= */
async function uploadFile(file) {
    if (!file) return;

    let formData = new FormData();
    formData.append("file", file);

    addMessage("Uploading document...", "bot");

    let res = await fetch(`http://127.0.0.1:8000/upload?thread_id=${thread_id}`, {
        method: "POST",
        body: formData
    });

    await res.json();

    addMessage("Document uploaded successfully", "bot");
}

/* ================= DRAG DROP ================= */
let dropArea = document.getElementById("dropArea");

dropArea.addEventListener("dragover", e => {
    e.preventDefault();
    dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop", e => {
    e.preventDefault();
    dropArea.classList.remove("dragover");

    let file = e.dataTransfer.files[0];
    uploadFile(file);
});

/* ================= CHAT HISTORY ================= */
function newChat() {
    if (currentChat.length > 0) {
        conversations.push([...currentChat]);
        renderHistory();
    }

    currentChat = [];
    document.getElementById("chat").innerHTML = "";
    createSession();
}

function renderHistory() {
    let historyDiv = document.getElementById("history");
    historyDiv.innerHTML = "";

    conversations.forEach((chat, index) => {
        let item = document.createElement("div");
        item.className = "history-item";
        item.innerText = chat[0]?.content || "Conversation";
        item.onclick = () => loadChat(index);
        historyDiv.appendChild(item);
    });
}

function loadChat(index) {
    let chat = conversations[index];

    document.getElementById("chat").innerHTML = "";

    chat.forEach(msg => {
        addMessage(msg.content, msg.role === "user" ? "user" : "bot");
    });

    currentChat = [...chat];
}

document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

</script>

</body>
</html>
